<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You 💕</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #fce4ec, #f8bbd0);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            max-width: 400px;
            position: relative;
            overflow: visible;
        }
        h1 { font-size: 2.5em; margin-bottom: 20px; }
        .message {
            font-size: 1.2em;
            color: #555;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        button {
            background: #e91e63;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.05); }
        .no-btn {
            position: absolute;
            transition: none;
        }
        .hidden { display: none; }
        .hearts {
            font-size: 2em;
            margin-top: 15px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="page1">
            <h1>Hello my liefie 💗</h1>
            <p class="message">Ek het die spesiaal gemaak vir jou, ietsie kleins...</p>
            <button onclick="show('page2')">Open 💌</button>
        </div>
        <div id="page2" class="hidden">
            <h1>🌸</h1>
            <p class="message">Ek is baie lief vir jou en ek waardeer jou baie my engel.</p>
            <button onclick="show('page3')">Nog een ding...</button>
        </div>
        <div id="page3" class="hidden">
            <h1>Question! 🙈</h1>
            <p class="message">Is jy darm nog lief vir my</p>
            <button onclick="show('page4')">Yes 💕</button>
            <button class="no-btn" id="noBtn"
                onmouseover="runAway()"
                ontouchstart="runAway()">No 🥺</button>
        </div>
        <div id="page4" class="hidden">
            <h1>Well you are! 🥰</h1>
            <p class="message">Jaa so gedink jy wou nee click.</p>
            <div class="hearts">💕💗💕</div>
        </div>
    </div>
    <script>
        function show(id) {
            document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function runAway() {
            const btn = document.getElementById('noBtn');
            const x = Math.random() * 250 - 125;
            const y = Math.random() * 250 - 125;
            btn.style.transform = `translate(${x}px, ${y}px)`;
        }
    </script>
</body>
</html>
